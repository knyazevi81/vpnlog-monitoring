server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: x-ui-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: x-ui
          __path__: /var/log/x-ui/access.log

    pipeline_stages:
      # Фильтруем только строки с "email:" — пропускаем служебные [api -> api]
      - match:
          selector: '{job="x-ui"}'
          stages:
            - regex:
                expression: '^(?P<timestamp>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) [\d.]+:\d+ (?P<status>\w+) (?P<protocol>tcp|udp):(?P<destination>[^:]+):(?P<dest_port>\d+) email: (?P<email>\S+)'

            - timestamp:
                source: timestamp
                format: "2006/01/02 15:04:05"
                # БЕЗ location — время в логах уже MSK, не сдвигаем

            - labels:
                status:
                protocol:
                email:

            - drop:
                expression: ".*\\[api -> api\\].*"